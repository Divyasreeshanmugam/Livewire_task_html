<html>
    <head>
        <title>
            fill the form
        </title>
        <style>
            
            th{background-color: rgb(174, 197, 91);}
            tr,td {border:1px solid rgb(54, 6, 52) }
        </style>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Fill the form</legend>
                <table>
                    <tr>
                        <th>Name</th>
                        <th>Value</th>
                    </tr>
                    <tr>
                        <td><label>Name</label></td>
                        <td><input type ="text"></td>
                    </tr>
                    <tr>
                        <td><label>Gender</label></td>
                        <td><input type ="radio" name="1">Male<br>
                        <input type ="radio" name="1">Female</td>
                    </tr>
                    <tr>
                        <td><label>Eye color</label></td>
                        <td><select name ="id" =" ">
                            <option>blue</option>
                            <option>black</option>
                            <option>green</option>
                        </select></td>
                    </tr>
                    <tr>
                        <td><label>Check all that apply</label></td>
                        <td><input type ="checkbox">over 6 feet tall<br>
                        <input type ="checkbox">over 200 feet tall </td>
                    </tr>
                    <tr>
                        <td colspan="2">
                            <label>Describe your atheletic ability:</label></td> 
                    </tr>
                    <tr>
                        <td colspan="2">
                            <textarea placeholder="Enter your comments"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td colspan ="2":align="center"><button>Enter my information</button></td>
                    </tr>
                </table>
            </fieldset>
        </form>
    </body>
</html>
