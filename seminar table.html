<html>

        <title>seminar table</title>
        <style>
            table{border-collapse: collapse;
            width:80%;

                border: 2px solid gray;
                padding :10px
            }
        </style>
    </head>

                        </td>
                </tr>

                    <td rowspan="3">Tuesday</td>

                </tr>
                <tr>
                    <td>11:00 am</td>
                    <td>2:00 pm</td>
                </tr>
                 <tr>
                    <td>2.00 pm</td>
                    <td>5:00 pm</td>

        </table>

    </html>
