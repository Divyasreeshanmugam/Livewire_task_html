<html>
    <head>
        <title>Fill the form</title>
        <style>
            td,tr{border:2px solid rgb(4, 34, 48);font-family: 'Lucida Sans';}
        button,legend{font-family: fantasy;}
        </style>
    </head>
    <body>
        <form>
            <fieldset>
                <table>
                    <legend>Fill the form </legend>
                    <tr>
                        <td><label>Name</label></td>
                        <td><input type ="text"></td>
                    </tr>
                    <tr>
                        <td><label>Password</label></td>
                        <td><input type="password"></td>
                    </tr>
                    <tr>
                        <td><label>Feedback</label></td>
                        <td><textarea placeholder="enter your Feedback"></textarea></td>

                    </tr>
                    <tr>
                        <td><label>Gender</label></td>
                        <td><input type="radio" name="1">Male<br>
                            <input type="radio" name="1">Female
                    </tr>
                    <tr>
                        <td><label>Subject</label></td>
                        <td><input type="checkbox">web<br>
                        <input type="checkbox">Math<br>
                        <input type="checkbox">Graphics<br>
                        <input type="checkbox">English<br>
                    </td>
                    </tr>
                    <tr>
                        <td colspan="2"><button>Reset all</button></td>
                        
                    </tr>
                    <tr>
                        <td colspan="2"><button>Submit above details</button></td>
                    </tr>
                </table>
            </fieldset>
        </form>
    </body>
</html>
